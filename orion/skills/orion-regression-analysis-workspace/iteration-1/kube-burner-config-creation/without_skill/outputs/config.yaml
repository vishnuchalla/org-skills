tests:
  - name: cluster-density-v2-control-plane
    index: ripsaw-kube-burner*
    benchmarkIndex: ripsaw-kube-burner*
    ES_config_path: ~/.orion/elasticsearch-config.yaml
    metadata:
      platform: AWS
      clusterType: rosa
      ocpVersion: "4.18"
      masterNodesCount: 3
      masterNodesType: m6a.xlarge
      workerNodesCount: 6
      workerNodesType: m6a.xlarge
      benchmark.keyword: cluster-density-v2
    metrics:
      - name: apiServerCPU
        metricName: apiServerCPU
        metric_of_interest: value
        agg:
          value: avg
          agg_period: 5m
        direction: 0

      - name: etcdDiskBackendCommitDurationP99
        metricName: 99thEtcdDiskBackendCommitDuration
        metric_of_interest: value
        agg:
          value: avg
          agg_period: 5m
        direction: 0

      - name: ovnKubernetesMemory
        metricName: ovnKubernetesMemory
        metric_of_interest: value
        agg:
          value: avg
          agg_period: 5m
        direction: 0
